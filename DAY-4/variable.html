<html>
<head>
    <title>javascript</title>
</head>

<body>
    <h2>Variables</h2>
    <p>In this example, x, y, z are variables</p>

    <p id="z"></p>
    <p id="b"></p>
    <p id="c"></p>
    <p id="d"></p>

    <script>
        var x = 5;
        var y = 6;

        var z = x + y;
        var b = x - y;
        var c = x * y;
        var d = x / y;

        document.getElementById("z").innerHTML = "Value of z is: " + z;
        document.getElementById("b").innerHTML = "Value of b is: " + b;
        document.getElementById("c").innerHTML = "Value of c is: " + c;
        document.getElementById("d").innerHTML = "Value of d is: " + d;
    </script>

</body>
</html>
